name: DPP Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── Security scanning (every commit) ────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gitleaks - secret detection
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy - filesystem vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: backend/
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Checkov - IaC security (K8s, Docker)
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/
          framework: kubernetes,dockerfile
          soft-fail: true

  # ─── Backend tests + coverage ─────────────────────────────────────────────
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml --cov-report=term-missing
        env:
          ENVIRONMENT: test
          NEO4J_URI: bolt://localhost:7687
          POSTGRES_HOST: localhost
          NEO4J_AUTH: neo4j/dpp-neo4j-dev

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend

  # ─── EU AI Act compliance check ───────────────────────────────────────────
  eu-ai-act-check:
    runs-on: ubuntu-latest
    needs: [backend-test]
    steps:
      - uses: actions/checkout@v4
      - name: Verify audit logging enabled
        run: |
          grep -q "audit_log" backend/infrastructure/init-postgres.sql && echo "PASS: audit_log table defined"
      - name: Verify AI disclosure in OpenAPI description
        run: |
          grep -q "EU AI Act" backend/app/main.py && echo "PASS: AI Act disclosure present"
      - name: Verify human oversight threshold config
        run: |
          grep -q "HUMAN_REVIEW_CONFIDENCE_THRESHOLD" backend/app/config.py && echo "PASS: confidence threshold configured"
      - name: Verify Annex IV documentation exists
        run: |
          test -f docs/compliance/eu_ai_act_annex_iv.md && echo "PASS: Annex IV documentation present"

  # ─── Build Docker images (multi-stage) ────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    needs: [backend-test, security-scan]
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: backend/
          push: false
          tags: dpp-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/dpp-api.tar

      - name: Trivy - container image scan
        uses: aquasecurity/trivy-action@master
        with:
          input: /tmp/dpp-api.tar
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom || true
          cd backend && cyclonedx-py -r requirements.txt -o cyclonedx_sbom.json --format json || true
        continue-on-error: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-cyclonedx
          path: backend/cyclonedx_sbom.json
          if-no-files-found: ignore

  # ─── Build frontend ────────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    needs: [security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend && npm ci

      - name: Build frontend
        run: |
          cd frontend && npm run build

  # ─── Canary deployment (main branch only) ─────────────────────────────────
  # Requires KUBECONFIG secret set in repo settings for staging environment.
  deploy-canary:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build-backend, eu-ai-act-check]
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy canary (10% traffic)
        run: |
          echo "=== Canary deployment: 10% ==="
          echo "In production: apply Istio VirtualService with weight 10 for canary, 90 for stable"
          echo "kubectl apply -k infrastructure/k8s/overlays/staging"
          echo "kubectl set image deployment/dpp-api dpp-api=dpp-api:${{ github.sha }} -n dpp-staging"

      - name: Smoke test
        run: |
          echo "=== Smoke test: verify /health and /ready ==="
          echo "In production: curl -f https://dpp-staging.example.com/health"

      - name: Promote to 50% then 100%
        run: |
          echo "=== Canary promotion would happen here ==="
          echo "Update Istio VirtualService weights: 50/50, then 0/100"
