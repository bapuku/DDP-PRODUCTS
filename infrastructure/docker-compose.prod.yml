# EU DPP Platform - Production Docker Compose
# VPS OVH Ubuntu 25.04 - 51.77.144.54
# All services: Neo4j, Qdrant, PostgreSQL, Kafka, Backend API, Frontend

version: "3.9"

services:
  neo4j:
    image: neo4j:5.15.0-community
    container_name: dpp-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/dpp-prod-change-me}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_dbms_memory_pagecache_size: 256m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - dpp-net

  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: dpp-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:6333/readyz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - dpp-net

  postgres:
    image: postgres:16-alpine
    container_name: dpp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dpp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dpp-prod-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-dpp_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dpp} -d ${POSTGRES_DB:-dpp_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dpp-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: dpp-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - dpp-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: dpp-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - dpp-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: dpp-schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - dpp-net

  dpp-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dpp-api
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_started
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: INFO
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/dpp-prod-change-me}
      QDRANT_URL: http://qdrant:6333
      POSTGRES_USER: ${POSTGRES_USER:-dpp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dpp-prod-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-dpp_platform}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-min-16-chars}
      CORS_ORIGINS: '["http://51.77.144.54:3100","http://51.77.144.54:8110","http://51.77.144.54:8100"]'
    ports:
      - "8100:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dpp-net

  dpp-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: dpp-frontend
    restart: unless-stopped
    depends_on:
      dpp-api:
        condition: service_healthy
    environment:
      BACKEND_URL: http://dpp-api:8000
    ports:
      - "3100:3000"
    networks:
      - dpp-net

  nginx:
    image: nginx:alpine
    container_name: dpp-nginx
    restart: unless-stopped
    depends_on:
      - dpp-api
      - dpp-frontend
    ports:
      - "8110:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dpp-net

volumes:
  neo4j_data:
  qdrant_data:
  postgres_data:

networks:
  dpp-net:
    driver: bridge
