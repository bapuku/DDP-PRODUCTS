# EU DPP Platform - Local development infrastructure
# Neo4j 5.x, Qdrant, PostgreSQL 16, Kafka + Schema Registry, FastAPI backend
# EU AI Act 2024/1689 compliant - audit trail, human oversight ready

version: "3.9"

services:
  neo4j:
    image: neo4j:5.15.0-community
    container_name: dpp-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/dpp-neo4j-dev}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
    ports:
      - "${NEO4J_PORT:-7687}:7687"
      - "${NEO4J_HTTP_PORT:-7474}:7474"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dpp-net

  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: dpp-qdrant
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dpp-net

  postgres:
    image: postgres:16-alpine
    container_name: dpp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dpp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dpp-dev-secret}
      POSTGRES_DB: ${POSTGRES_DB:-dpp_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dpp} -d ${POSTGRES_DB:-dpp_platform}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dpp-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: dpp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - dpp-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: dpp-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - dpp-net

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: dpp-schema-registry
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dpp-net

  dpp-api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dpp-api
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/dpp-neo4j-dev}
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dpp}:${POSTGRES_PASSWORD:-dpp-dev-secret}@postgres:5432/${POSTGRES_DB:-dpp_platform}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_URL: http://schema-registry:8081
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../backend:/app:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dpp-net

volumes:
  neo4j_data:
  qdrant_data:
  postgres_data:

networks:
  dpp-net:
    driver: bridge
