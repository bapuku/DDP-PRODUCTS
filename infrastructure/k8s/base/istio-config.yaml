# Istio service mesh - mTLS, circuit breaker, retry policy
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: dpp-api
spec:
  host: dpp-api
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
    connectionPool:
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: dpp-api
spec:
  hosts:
    - dpp-api
  http:
    - retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: gateway-error,connect-failure,retriable-4xx
      route:
        - destination:
            host: dpp-api
            port:
              number: 8000
          weight: 100
---
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
spec:
  mtls:
    mode: STRICT
