# Default deny, allow only ingress to dpp-api from ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dpp-api-default-deny
spec:
  podSelector:
    matchLabels:
      app: dpp-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 7687
        - protocol: TCP
          port: 6333
        - protocol: TCP
          port: 9092
